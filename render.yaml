# One-click deploy: https://render.com/deploy?repo=https://github.com/Sammy-727/Project-1
services:
  - type: web
    name: grandstay-hms
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
