<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout('Check In / Out', ~{::main})}">
<main>
<div class="grid-2">
    <div class="panel">
        <div class="panel-head"><h3>Today's Arrivals</h3><span th:text="${today}">today</span></div>
        <table class="data-table" th:if="${!arrivals.isEmpty()}">
            <thead><tr><th>Booking</th><th>Guest</th><th>Room</th><th>Action</th></tr></thead>
            <tbody>
            <tr th:each="b : ${arrivals}">
                <td th:text="'#' + ${b.id}">#1</td>
                <td th:text="${b.customer.name}">Name</td>
                <td th:text="${b.room.roomNo}">101</td>
                <td><form th:action="@{/checkin-out/checkin/{id}(id=${b.id})}" method="post"><button class="btn btn-success btn-sm">Check In</button></form></td>
            </tr>
            </tbody>
        </table>
        <div class="empty-state" th:if="${arrivals.isEmpty()}"><p>No arrivals pending.</p></div>
    </div>
    <div class="panel">
        <div class="panel-head"><h3>Active Stays</h3></div>
        <table class="data-table" th:if="${!activeStays.isEmpty()}">
            <thead><tr><th>Guest</th><th>Room</th><th>Balance</th><th>Action</th></tr></thead>
            <tbody>
            <tr th:each="b : ${activeStays}">
                <td th:text="${b.customer.name}">Name</td>
                <td th:text="${b.room.roomNo}">101</td>
                <td class="danger" th:text="'Rs.' + ${balanceMap[b.id]}">0</td>
                <td>
                    <form th:action="@{/checkin-out/checkout/{id}(id=${b.id})}" method="post" class="inline-form">
                        <input name="paymentAmount" type="number" th:value="${balanceMap[b.id]}" min="0" style="width:90px">
                        <select name="paymentMode"><option>Cash</option><option>UPI</option><option>Card</option></select>
                        <button class="btn btn-primary btn-sm">Check Out</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</main>
</html>
